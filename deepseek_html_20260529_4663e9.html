// ======================== 新增功能 1：导出购物清单 CSV ========================
function exportShopCSV() {
  const headers = ['Name', 'Category', 'Status'];
  const rows = shopItems.map(s => [
    s.name,
    s.category,
    s.done ? 'Purchased' : 'To buy'
  ]);
  const csv = [headers, ...rows]
    .map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(','))
    .join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `FreshFlow_shop_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('Shopping list exported!');
}

// ======================== 新增功能 2：过期物品自动 Toast 提醒 ========================
function checkAndNotifyExpiring() {
  const now = new Date();
  const expiring = fridgeItems.filter(i => !i.archived && daysUntil(i.expiry_date) >= 0 && daysUntil(i.expiry_date) <= 2);
  if (expiring.length && document.visibilityState === 'visible') {
    showToast(`⚠️ ${expiring.length} item(s) expiring within 2 days!`, 3000);
  }
}

// 在数据加载完成后调用一次（loadItems 之后）
// 以及每分钟轮询一次
let expirationInterval = null;
function startExpirationCheck() {
  if (expirationInterval) clearInterval(expirationInterval);
  checkAndNotifyExpiring();
  expirationInterval = setInterval(checkAndNotifyExpiring, 60000);
}

// 修改 loadItems，加载完成后启动检查
const originalLoadItems = loadItems;
loadItems = async function() {
  await originalLoadItems();
  startExpirationCheck();
};

// 修改 loadProfile 也触发一次检查
const originalLoadProfile = loadProfile;
loadProfile = async function(user) {
  await originalLoadProfile(user);
  startExpirationCheck();
};

// 页面可见性变化时也检查一次
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkAndNotifyExpiring();
});
